spring.application.name=ProfileMS

server.port=9100

spring.datasource.url=jdbc:mysql://localhost:3306/profiledb
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

DOCTOR_NOT_FOUND=Doctor not found
DOCTOR_ALREADY_EXISTS=Doctor already exists

PATIENT_NOT_FOUND=Patient not found
PATIENT_ALREADY_EXISTS=Patient already exists

# Legacy hard-delete message; soft delete no longer triggers FK errors, kept for any future use.
PROFILE_DELETE_CONFLICT=This profile cannot be deleted because it is still referenced by other records (e.g. appointments).
PROFILE_SEARCH_QUERY_REQUIRED=Search query is required.

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true